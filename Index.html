<!DOCTYPE html>
<html>
<head>
    <title>4 Months Together ❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff6a88, #ff99ac);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        h1 {
            margin-top: 80px;
            font-size: 45px;
        }

        p {
            font-size: 20px;
            margin: 10px;
        }

        img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            margin-top: 20px;
            border: 4px solid white;
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            color: white;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* Button */
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: white;
            color: #ff4d6d;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>Happy 4 Months ❤️</h1>

    <p>4 months, countless memories 💕</p>
    <p>You made my life more beautiful 🌸</p>
    <p>I’m lucky to have you 💫</p>

    <!-- Add your image here -->
    <img src="your-photo.jpg" alt="us">

    <br>

    <button onclick="playMusic()">Play Music 🎶</button>

    <!-- Music -->
    <audio id="music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playMusic() {
            document.getElementById("music").play();
        }

        // Create floating hearts
        setInterval(() => {
            let heart = document.createElement("div");
            heart.innerHTML = "❤️";
            heart.classList.add("heart");

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 20 + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);

        }, 300);
    </script>

</body>
</html>
