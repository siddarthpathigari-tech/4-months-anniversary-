<!DOCTYPE html>
<html>
<head>
    <title>4 Months ❤️</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: black;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            margin-top: 50px;
            font-size: 40px;
            color: #ff4d6d;
        }

        #text {
            font-size: 20px;
            margin: 20px;
            min-height: 40px;
        }

        /* Slideshow */
        .slideshow {
            width: 250px;
            height: 250px;
            margin: auto;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid white;
        }

        .slideshow img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            color: #ff4d6d;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-10vh); }
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #ff4d6d;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Happy 4 Months ❤️</h1>

<div id="text"></div>

<div class="slideshow">
    <img src="IMG-20260425-WA0000.jpg">
    <img src="IMG-20260425-WA0001.jpg">
    <img src="IMG-20260425-WA0002.jpg">
</div>

<button onclick="playMusic()">Play Music 🎶</button>

<audio id="music" loop>
    <source src="golden hour.mp3">
</audio>

<script>
/* Typing effect */
let msg = "4 months with you = best decision of my life 💖";
let i = 0;
function type() {
    if (i < msg.length) {
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type, 50);
    }
}
type();

/* Slideshow */
let slides = document.querySelectorAll(".slideshow img");
let index = 0;
slides[index].style.display = "block";

setInterval(() => {
    slides[index].style.display = "none";
    index = (index + 1) % slides.length;
    slides[index].style.display = "block";
}, 2000);

/* Music */
function playMusic() {
    document.getElementById("music").play();
}

/* Floating hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 300);

</script>

</body>
</html>
